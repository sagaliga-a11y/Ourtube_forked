name: 01 - 🏆 دانلود از یوتیوب ( اصلی )

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Start WARP Container
        run: |
          docker network create warp-net || true
          docker run -d --name warp --restart=always --network warp-net -p 1080:1080 --cap-add NET_ADMIN --sysctl net.ipv6.conf.all.disable_ipv6=0 --sysctl net.ipv4.conf.all.src_valid_mark=1 -v warp-data:/var/lib/cloudflare-warp caomingjun/warp
          sleep 15
          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then echo "WARP is active!"; break; fi
            sleep 5
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip rar
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          DOWNLOAD_SUBS: ${{ github.event.inputs.download_subtitles }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: python3 scripts/video-get.py

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          source /tmp/env_vars.txt
          REPO_OWNER=${REPO_OWNER_ENV}
          REPO_NAME=${REPO_NAME_ENV}
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "WARNING: No files in backup directory"
            git fetch origin "$BRANCH"
            git reset --hard origin/"$BRANCH"
            mkdir -p videos
            if [ ! -f "videos/README.md" ]; then
              echo -e "# DOWNLOADED VIDEOS LIST :\n\n----\n\n> No videos downloaded yet." > videos/README.md
              git add -f videos/README.md
              git diff --cached --quiet || git commit -m "[AVASAM] Initialize videos folder [skip ci]"
              timeout 60 git push origin HEAD:"$BRANCH" || true
            fi
            exit 0
          fi

          regenerate_master_readme() {
            MASTER_README="videos/README.md"
            { echo "# DOWNLOADED VIDEOS LIST :"; echo ""; echo "----"; echo ""; } > "$MASTER_README"
            NUM=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$((NUM + 1))
              FOLDER_ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME")
              FOLDER_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENCODED}"
              printf -- "- %s - 🎬 [%s](%s)\n" "$NUM" "$FOLDER_NAME" "$FOLDER_LINK" >> "$MASTER_README"
            done
          }

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/

          git add -f videos/
          regenerate_master_readme
          git add -f videos/README.md

          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] YouTube download [skip ci]"
            PUSH_RETRY=0
            while [ $PUSH_RETRY -lt 10 ]; do
              PUSH_RETRY=$((PUSH_RETRY + 1))
              if timeout 300 git push origin HEAD:"$BRANCH"; then
                echo "Push successful!"
                break
              else
                echo "Push failed, retry $PUSH_RETRY/10..."
                sleep 5
                git fetch origin "$BRANCH"
                git reset --hard origin/"$BRANCH"
                cp -r "$BACKUP_DIR"/* videos/
                git add -f videos/
                regenerate_master_readme
                git add -f videos/README.md
                git diff --cached --quiet || git commit -m "[AVASAM] YouTube download [skip ci]"
              fi
            done
          fi
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "made in AVASAM (https://avasam.ir)"
          echo "=========================================="
